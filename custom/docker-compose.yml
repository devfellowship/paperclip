version: "3.3"

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: paperclip
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  server:
    image: paperclip:custom
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_PUBLIC_URL: https://${PAPERCLIP_HOST}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - paperclip-data:/paperclip
      - /root/apps/paperclip/workspaces:/workspaces
      - /root/.claude/.credentials.json:/paperclip/.claude/.credentials.json:ro
      - /home/openclaw/.openclaw:/home/openclaw/.openclaw
      - /mnt/HC_Volume_105256938:/mnt/HC_Volume_105256938
    networks:
      - internal
      - traefik-public
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.paperclip.rule=Host(`${PAPERCLIP_HOST}`)
        - traefik.http.routers.paperclip.entrypoints=websecure
        - traefik.http.routers.paperclip.tls.certresolver=letsencrypt
        - traefik.http.services.paperclip.loadbalancer.server.port=3100

volumes:
  pgdata:
  paperclip-data:

networks:
  internal:
  traefik-public:
    external: true
